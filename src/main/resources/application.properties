spring.application.name=auth-server

spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

jwt.public.key = classpath:env/app.pub
jwt.secret = classpath:env/app.key
resend.api.key = ${API_KEY:default_api_key}

spring.threads.virtual.enabled=true

app.security.jwt.expiration-seconds=${JWT_EXPIRATION:300}

spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mydatabase}
spring.datasource.driver-class-name=org.postgresql.Driver